name: Push image

on:
  push:
    branches:
      - main
      - setup-cd
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    if: ${{ github.repository == 'authgear/authgear-site-admin-portal' }}
    runs-on: ubuntu-24.04
    env:
      IMAGE_NAME: quay.io/theauthgear/authgear-site-admin-portal
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git_hash="git-${GITHUB_SHA::12}"
          docker build --pull --tag "${IMAGE_NAME}:${git_hash}" .

      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Push image
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git_hash="git-${GITHUB_SHA::12}"
          docker push "${IMAGE_NAME}:${git_hash}"

  deploy-staging:
    needs: image
    if: ${{ github.repository == 'authgear/authgear-site-admin-portal' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Set up SSH key
        shell: bash
        env:
          DEPLOY_KEY: ${{ secrets.AUTHGEAR_STAGING_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone deploy repo
        shell: bash
        env:
          STAGING_REPO: ${{ secrets.AUTHGEAR_STAGING_REPO }}
        run: |
          set -euo pipefail
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" git clone --depth=1 --branch master "$STAGING_REPO" deploy-repo

      - name: Update site admin portal image
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git_hash="git-${GITHUB_SHA::12}"
          cd deploy-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          bash scripts/update-site-admin-portal-image.sh "${git_hash}"

      - name: Push deploy repo
        shell: bash
        run: |
          set -euo pipefail
          cd deploy-repo
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" git push origin master
