<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#176df3" />
    <meta name="description" content="Authgear Admin Portal" />
    <title>Authgear Site Admin Portal</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      window.__config = {
        baseDomain: "{{ env `VITE_BASE_DOMAIN` }}",
        authgearEndpoint: "{{ env `VITE_AUTHGEAR_ENDPOINT` }}",
        authgearClientID: "{{ env `VITE_AUTHGEAR_CLIENT_ID` }}",
        authgearRedirectURL: "{{ env `VITE_AUTHGEAR_REDIRECT_URL` }}",
        portalURL: "{{ env `VITE_PORTAL_URL` }}",
        siteadminAPIURL: "{{ env `VITE_SITEADMIN_API_URL` }}",
      };
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
